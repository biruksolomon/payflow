# .github/workflows/ci.yml
# CONTINUOUS INTEGRATION ONLY

name: CI - Build & Test
on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

  # ==================== ALLOW PERMISSION ====================
permissions:
  contents: read
  packages: write


jobs:
  # ==================== CODE QUALITY ====================
  code-quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run SonarQube Analysis (Optional - add later)
        run: |
          echo "SonarQube scanning code..."
          # mvn clean verify sonar:sonar -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      - name: Check code formatting
        run: |
          echo "Checking code style..."
          # mvn spotless:check (add plugin to pom.xml for this)
          
  test:
    runs-on: ubuntu-latest

    steps:
      - name: CheckOut Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name : test run
        run: ./mvnw test

  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build Jar
        run: ./mvnw clean package -DskipTests

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository }}:latest \
            -t ghcr.io/${{ github.repository }}:${{ github.sha }} \
            .

      - name: Push Latest
        run: docker push ghcr.io/${{ github.repository }}:latest

      - name: Push SHA
        run: docker push ghcr.io/${{ github.repository }}:${{ github.sha }}



  deploy-dev:
    name: Deploy Development
    if: github.ref == 'refs/heads/develop'
    needs: build
    runs-on: ubuntu-latest
    environment: STAGING

    steps:
      - name: Development Deployment
        run: |
          echo "==================================="
          echo "DEPLOYING TO DEVELOPMENT"
          echo "Repository: ${{ github.repository }}"
          echo "Image: ghcr.io/${{ github.repository }}:${{ github.sha }}"
          echo "Environment: development"
          echo "==================================="

  deploy-prod:
    name: Deploy Production
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: PRODUCTION

    steps:
      - name: Production Deployment
        run: |
          echo "==================================="
          echo "DEPLOYING TO PRODUCTION"
          echo "Repository: ${{ github.repository }}"
          echo "Image: ghcr.io/${{ github.repository }}:${{ github.sha }}"
          echo "Environment: production"
          echo "==================================="


